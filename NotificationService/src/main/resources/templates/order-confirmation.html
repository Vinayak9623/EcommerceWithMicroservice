<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .header {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .header h1 {
            color: #2c3e50;
            margin: 0;
        }
        .content {
            margin-bottom: 30px;
        }
        .order-details {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
        }
        .footer {
            text-align: center;
            font-size: 0.9em;
            color: #777;
            margin-top: 30px;
        }
        .highlight {
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Order Confirmed!</h1>
        </div>
        <div class="content">
            <p>Hi <span th:text="${customerName}">Customer</span>,</p>
            <p>Thank you for your order! We've received your request and we're getting it ready for you.</p>
            
            <div class="order-details">
                <p><strong>Order ID:</strong> #<span th:text="${orderId}">12345</span></p>
                <p><strong>Status:</strong> <span class="highlight" th:text="${orderStatus}">PENDING</span></p>
                <p><strong>Total Amount:</strong> $<span th:text="${totalAmount}">0.00</span></p>
            </div>
        </div>
        <div class="footer">
            <p>If you have any questions, please contact our support team.</p>
            <p>&copy; 2026 Ecommerce App. All rights reserved.</p>
        </div>
    </div>
</body>
</html>

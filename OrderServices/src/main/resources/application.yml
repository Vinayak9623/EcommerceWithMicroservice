spring:
  profiles:
    active: dev
  application:
    name: order-service
  datasource:
    url: jdbc:mysql://localhost:3306/usersMicro
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8092

jwt:
